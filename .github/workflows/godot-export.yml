name: Build Godot Exports

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.5.2"
  PROJECT_NAME: "SnekTake2"

jobs:
  export-linux:
    name: Export (Linux)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2
      credentials:
        username: mtdig
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux" "build/linux/${PROJECT_NAME}.x86_64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-linux
          path: build/linux/
          retention-days: 30

  export-windows:
    name: Export (Windows)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2
      credentials:
        username: mtdig
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Snake" "build/windows/${PROJECT_NAME}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-windows
          path: build/windows/
          retention-days: 30

  export-macos:
    name: Export (macOS)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2
      credentials:
        username: mtdig
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: macOS Build
        run: |
          mkdir -v -p build/macos
          godot --headless --verbose --export-release "macOS" "build/macos/${PROJECT_NAME}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-macos
          path: build/macos/
          retention-days: 30

  export-linux-arm64:
    name: Export (Linux arm64)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.2
      credentials:
        username: mtdig
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Linux arm64 Build
        run: |
          mkdir -v -p build/linux-arm64
          godot --headless --verbose --export-release "Linux arm64" "build/linux-arm64/${PROJECT_NAME}.arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-linux-arm64
          path: build/linux-arm64/
          retention-days: 30

  release:
    needs: [export-linux, export-linux-arm64, export-windows, export-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
