name: Build Godot Exports

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.5"
  PROJECT_NAME: "SnekTake2"

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - preset: "Linux"
            export_path: "build/linux/SnekTake2.x86_64"
            artifact: "linux"
          - preset: "Snake"
            export_path: "build/windows/SnekTake2.exe"
            artifact: "windows"
          - preset: "macOS"
            export_path: "build/macos/SnekTake2.zip"
            artifact: "macos"

    name: Export (${{ matrix.preset }})
    container:
      image: barichello/godot-ci:4.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/* \
             /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true
          ls /root/.local/share/godot/export_templates/ || true

      - name: Create export directory
        run: mkdir -p $(dirname "${{ matrix.export_path }}")

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 5

      - name: Export ${{ matrix.preset }}
        run: godot --headless --export-release "${{ matrix.preset }}" "${{ matrix.export_path }}"
        timeout-minutes: 10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}/
          retention-days: 30

  release:
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
